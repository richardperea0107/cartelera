    <header class="cabecera">
        <nav class="navbar bg-body-tertiary mi-navegador">
            <div class="container-fluid mi-contenedor">
                <a class="navbar-brand mi-referencia" th:href="@{/}">
                    <img th:src="@{/image/latidos.png}" class="logo-imagen" alt="Latidos Bejucaleños">
                </a>
                <div class="mi_mensaje">
                    <h1 class="mi_mensaje_texto">LATIDOS BEJUCALEÑOS</h1>
                </div>
                <ul sec:authorize="hasRole('ADMIN')" class="menu-cartelera">
                    <li><a class="menu-link" th:href="@{/usuarios/listar}">Usuarios</a></li>
                    <li><a class="menu-link" th:href="@{/eventos/listar}">Eventos</a></li>
                </ul>
                <div class="login_inicio">
                    <input type="checkbox" id="login-togle" hidden>
                    <label for="login-togle" class="boton">
                        <i class="bi bi-person icono_user "></i>
                        <span class="login_user">LOGIN</span>
                    </label>
                    <div class="login_formulario-login">
                        <div class="Title">INICIAR SESION</div>
                        <form th:action="@{/login}" class="login_formulario-horizontal" method="post">
                            <label class="form-label">
                                <input type="text" name="username" class="form-control" placeholder="Usuarios">
                            </label>
                            <label class="form-label">
                                <input type="password" name="password" class="form-control" placeholder="Contraseña">
                            </label>
                            <button type="submit" class="form-button_registrarse">Registrarse</button>
                        </form>
                    </div>
                </div>
                <div sec:authorize="isAuthenticated()" class="logout_formulario">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="form-button_cerrar-sesion">
                            <img th:src="@{/image/latidos-logo.png}" class="logout" alt="salir">
                        </button>
                    </form>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="retenedor">
            <form class="col-lg-6 col-lg-offset-3 formulario" th:action="@{/eventos/guardar}" th:object="${evento}"
                method="post" enctype="multipart/form-data">
                <div class="principal">
                    <h1 class="principal-cabecera"> Adicionar Evento </h1>
                </div>
                <div class="row">
                    <div class="col-lg-12">
                        <select th:field="*{dia_semana}" class="campo campo-fecha">
                            <option value="Lunes"> Lunes</option>
                            <option value="Martes"> Martes</option>
                            <option value="Miercoles"> Miércoles</option>
                            <option value="Jueves"> Jueves</option>
                            <option value="Viernes"> Viernes</option>
                            <option value="Sabado"> Sábado</option>
                            <option value="Domingo"> Domingo</option>
                        </select>
                    </div>
                    <div class="col-lg-6">
                        <input class="campo" type="text" th:field="*{titulo}" placeholder="Título" required
                            oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1);">
                    </div>
                    <div class="col-lg-6">
                        <input class="campo" type="time" th:field="*{hora_inicio}" placeholder=" Hora-Inicio" required>
                    </div>
                    <div class="col-lg-6">
                        <input class="campo" type="text" th:field="*{lugar}" placeholder="Lugar" required
                            oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1);">
                    </div>
                    <div class="col-lg-6">
                        <input class="campo" type="time" th:field="*{hora_fin}" placeholder=" Hora-Fin" required>
                    </div>
                    <div class="col-lg-6">
                        <input type="number" th:field="*{precio}" placeholder="Precio" class="campo" required min="0">
                    </div>
                    <div class="col-lg-6">
                        <textarea class="campo campo-descripcion" th:field="*{descripcion}" placeholder="Descripción"
                            required 
                            oninput="this.value = this.value.replace(/[^A-Za-záéíóúÁÉÍÓÚüÜñÑ\s]/g, '');
                            this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1);"></textarea>
                    </div>
                    <div class="col-lg-12">
                        <input type="file" name="imagenFile" class="campo campo-archivo" accept="image/*" required>
                    </div>
                    <div class="col-lg-12">
                        <input class="boton-guardar" type="submit" value="Guardar">
                    </div>
                </div>
            </form>
        </div>
    </main>
    <script th:src="@{/js/desapareceMensaje.js}"></script>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
