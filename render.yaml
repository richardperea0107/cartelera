services:
  - type: web
    name: cartelera
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/cartelera-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false