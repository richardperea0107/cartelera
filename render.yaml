services:
  - type: web
    name: cartelera
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/cartelera-0.0.1-SNAPSHOT.jar
    numInstances: 1
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: JAVA_VERSION
        value: "21"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false